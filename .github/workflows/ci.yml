name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref so an active repo doesn't pile up jobs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned to match the committed bun.lock format; bump deliberately
          # alongside a regenerated lockfile so CI stays deterministic.
          bun-version: 1.3.9

      - name: Install dependencies
        # Non-frozen: bun's frozen check rejects a lockfile authored on a different
        # OS. Determinism comes from the pinned bun version above + the committed
        # lockfile (which bun prefers); the build/test job is the real drift gate.
        run: bun install

      - name: Build (tsc)
        run: bun run build

      - name: Test
        run: bun test
